format:
  html:
    theme:
      light:
        - cosmo
        - custom.scss
      dark:
        - darkly
        - custom-dark.scss
    mainfont: "'Spectral', Georgia, serif"
    monofont: "'DM Mono', monospace"
    fontsize: "1.25rem"
    linestretch: 1.7
    code-copy: true
    html-math-method: katex
    toc: true
    toc-depth: 3
